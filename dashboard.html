<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productivity Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">
    <!-- Clock & Date -->
    <header class="app-header">
      <div class="clock" id="clock" aria-live="off">00:00</div>
      <div class="date" id="date">Loading…</div>
    </header>

    <!-- Search -->
    <section class="search-section" aria-label="Web Search">
      <form class="search-form" id="search-form" autocomplete="off">
        <div class="search-box">
          <select id="search-engine" class="search-engine-select" aria-label="Search engine">
            <option value="google">Google</option>
            <option value="bing">Bing</option>
            <option value="duckduckgo">DuckDuckGo</option>
            <option value="perplexity">Perplexity</option>
            <option value="brave">Brave</option>
          </select>
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Search the web..."
            aria-label="Search query"
            autofocus
          />
          <button type="submit" class="search-btn" aria-label="Search">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
        </div>
      </form>
    </section>

    <!-- Quick Actions -->
    <nav class="quick-actions" aria-label="Quick Actions">
      <button type="button" id="btn-ai-assistants" class="action-btn" aria-haspopup="dialog">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a10 10 0 1 0 10 10H12V2z"></path>
          <path d="M12 2a10 10 0 0 1 10 10"></path>
          <path d="M12 12 2.1 10.5"></path>
        </svg>
        <span>AI Assistants</span>
      </button>
      <button type="button" id="btn-my-links" class="action-btn" aria-haspopup="dialog">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
        </svg>
        <span>My Links</span>
      </button>
    </nav>

    <!-- Productivity Panels -->
    <main class="dashboard">
      <!-- Left: Pomodoro -->
      <section class="panel pomodoro-panel" aria-label="Pomodoro Timer">
        <header class="panel-header">
          <h2>Pomodoro</h2>
        </header>
        <div class="pomodoro-body">
          <div class="timer-display" id="timer-display" aria-live="polite">25:00</div>
          <div class="timer-mode" id="timer-mode">Work</div>
          <div class="timer-controls">
            <button type="button" id="timer-toggle" class="btn btn-primary" aria-label="Start timer">Start</button>
            <button type="button" id="timer-reset" class="btn btn-secondary" aria-label="Reset timer">Reset</button>
          </div>
        </div>
      </section>

      <!-- Center: Notepad -->
      <section class="panel notepad-panel" aria-label="Quick Notepad">
        <header class="panel-header">
          <h2>Notepad</h2>
          <span class="save-indicator" id="save-indicator" aria-live="polite"></span>
        </header>
        <div class="notepad-body">
          <textarea
            id="notepad-textarea"
            class="notepad-textarea"
            placeholder="Jot down your thoughts..."
            spellcheck="false"
          ></textarea>
        </div>
      </section>

      <!-- Right: To-Do -->
      <section class="panel todo-panel" aria-label="To-Do List">
        <header class="panel-header">
          <h2>To-Do</h2>
        </header>
        <div class="todo-body">
          <div class="todo-input-row">
            <input
              type="text"
              id="todo-input"
              class="todo-input"
              placeholder="Add a new task..."
              aria-label="New task"
            />
            <button type="button" id="todo-add" class="btn btn-primary" aria-label="Add task">Add</button>
          </div>
          <ul class="todo-list" id="todo-list" role="list"></ul>
        </div>
      </section>
    </main>
  </div>

  <!-- Links Strip (Bottom) -->
  <div class="links-strip" id="links-strip"></div>

  <!-- AI Assistants Modal -->
  <div class="modal" id="modal-ai" role="dialog" aria-modal="true" aria-labelledby="modal-ai-title" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-ai-title">AI Assistants</h3>
        <button type="button" class="modal-close" data-close-modal aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="ai-grid" id="ai-grid"></div>
      </div>
    </div>
  </div>

  <!-- My Links Modal -->
  <div class="modal" id="modal-links" role="dialog" aria-modal="true" aria-labelledby="modal-links-title" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-links-title">My Links</h3>
        <button type="button" class="modal-close" data-close-modal aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <form class="add-link-form" id="add-link-form" autocomplete="off">
          <input type="text" id="link-label" class="link-form-input" placeholder="Label" required />
          <input type="url" id="link-url" class="link-form-input" placeholder="https://example.com" required />
          <label class="link-form-checkbox-label">
            <input type="checkbox" id="link-homepage" class="link-form-checkbox" />
            <span>Show on home page</span>
          </label>
          <button type="submit" class="btn btn-primary">Add</button>
        </form>
        <ul class="links-list" id="links-list" role="list"></ul>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
